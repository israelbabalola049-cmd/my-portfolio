<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Send a Message — Israel Babalola</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --text: #f0ede8;
    --muted: #555552;
    --border: rgba(255,255,255,0.06);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    overflow: hidden;
  }

  /* kill ALL browser chrome on textarea */
  textarea {
    -webkit-appearance: none;
    appearance: none;
    resize: none;
    border-radius: 0;
  }
  textarea::-webkit-resizer { display: none; }
  textarea::-webkit-scrollbar { display: none; }
  textarea { scrollbar-width: none; }

  .chat-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── BACK ── */
  .chat-topbar {
    padding: 1.2rem 1.4rem 0.6rem;
    flex-shrink: 0;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.42rem 0.85rem 0.42rem 0.65rem;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.14); }
  .back-btn:hover svg { transform: translateX(-2px); }
  .back-btn svg { transition: transform 0.2s; }

  /* ── MESSAGES ── */
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 0.8rem 1.4rem 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    scrollbar-width: none;
  }
  .chat-body::-webkit-scrollbar { display: none; }

  .chat-date {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
    opacity: 0.7;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 72%;
  }
  .msg.from-me   { align-self: flex-end;   align-items: flex-end; }
  .msg.from-them { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 0.6rem 0.9rem;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .from-them .bubble {
    background: #161616;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px 16px 16px 4px;
    color: rgba(240,237,232,0.78);
  }
  .from-me .bubble {
    background: #1c2333;
    border-radius: 16px 16px 4px 16px;
    color: var(--text);
  }

  /* typing */
  .typing-wrap { align-self: flex-start; }
  .typing-bubble {
    background: #161616;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px 16px 16px 4px;
    padding: 0.7rem 0.9rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .typing-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.16s; }
  .typing-dot:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* final card */
  .final-card {
    align-self: center;
    margin-top: 0.8rem;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    text-align: center;
    background: #0f0f0f;
    max-width: 300px;
    animation: msgIn 0.3s ease forwards;
  }
  .final-card-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 0.8rem;
    color: rgba(240,237,232,0.3);
  }
  .final-card h4 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .final-card p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── SUGGESTIONS (shown for subject step) ── */
  .suggestions {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0.4rem 1.4rem 0.5rem;
    flex-shrink: 0;
  }
  .suggestions.show { display: flex; }
  .suggestion {
    padding: 0.35rem 0.8rem;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: rgba(240,237,232,0.45);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .suggestion:hover {
    border-color: rgba(255,255,255,0.18);
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  /* ── INPUT BAR ── */
  .chat-input-bar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 0.7rem 1.4rem 1.1rem;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .chat-textarea {
    flex: 1;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    line-height: 1.55;
    padding: 0.62rem 0.9rem;
    outline: none;
    resize: none;
    min-height: 42px;
    max-height: 110px;
    transition: border-color 0.2s;
    overflow: hidden;
    display: block;
    width: 100%;
    /* kill webkit junk */
    -webkit-appearance: none;
    appearance: none;
  }
  .chat-textarea::placeholder { color: #2e2e2c; }
  .chat-textarea:focus { border-color: rgba(255,255,255,0.13); }

  .send-btn {
    width: 42px;
    height: 42px;
    min-width: 42px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .send-btn:hover {
    background: rgba(255,255,255,0.09);
    color: var(--text);
    border-color: rgba(255,255,255,0.14);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: none; }
  }
  .msg { animation: msgIn 0.22s ease forwards; }

  @media (max-width: 480px) {
    .msg { max-width: 84%; }
  }
</style>
</head>
<body>
<div class="chat-shell">

  <div class="chat-topbar">
    <a href="index.html#contact" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      Back
    </a>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="chat-date" id="chatDate"></div>
    <div class="msg from-them">
      <div class="bubble">Hey, what's your name?</div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="useSuggestion(this)">Freelance project</button>
    <button class="suggestion" onclick="useSuggestion(this)">Collaboration</button>
    <button class="suggestion" onclick="useSuggestion(this)">Full-time opportunity</button>
    <button class="suggestion" onclick="useSuggestion(this)">Just saying hi</button>
    <button class="suggestion" onclick="useSuggestion(this)">Something else</button>
  </div>

  <div class="chat-input-bar" id="inputBar">
    <textarea class="chat-textarea" id="chatInput" placeholder="Message..." rows="1"></textarea>
    <button class="send-btn" onclick="handleSend()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>
<script>
  // Date
  document.getElementById('chatDate').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  const chatBody   = document.getElementById('chatBody');
  const chatInput  = document.getElementById('chatInput');
  const inputBar   = document.getElementById('inputBar');
  const suggestions = document.getElementById('suggestions');

  let step = 0;
  const data = { name: '', subject: '', message: '' };

  // Varied, human reply pools
  const nameReplies = (name) => pick([
    `${name}, nice one. What brings you here?`,
    `Good to meet you ${name}. What is this about?`,
    `${name}. Got it. So what can I do for you?`,
    `Hey ${name}. What is on your mind?`,
  ]);

  const subjectReplies = [
    "Say less. Tell me more about it.",
    "Alright, I am listening. Go ahead.",
    "Okay. What would you like to say?",
    "Got it. What do you want me to know?",
    "Cool. Drop everything in the box below.",
  ];

  const finalReplies = [
    "Received. I will get back to you within 24 hours.",
    "Perfect. I will hit you back within the day.",
    "Got it, thanks for reaching out. Give me 24 hours.",
    "Message received. Talk soon.",
    "Noted. I will be in touch within 24 hours.",
  ];

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // Auto-resize
  chatInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });
  chatInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  function scrollBottom() {
    setTimeout(() => { chatBody.scrollTop = chatBody.scrollHeight; }, 40);
  }

  function addBubble(text, side) {
    const msg = document.createElement('div');
    msg.className = `msg from-${side}`;
    msg.innerHTML = `<div class="bubble">${text}</div>`;
    chatBody.appendChild(msg);
    scrollBottom();
  }

  async function themTyping(delay = 380, duration = 820) {
    await wait(delay);
    const wrap = document.createElement('div');
    wrap.className = 'msg from-them typing-wrap';
    wrap.id = 'typingEl';
    wrap.innerHTML = `<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    chatBody.appendChild(wrap);
    scrollBottom();
    await wait(duration);
    wrap.remove();
  }

  async function themSays(text, delay = 380, duration = 820) {
    await themTyping(delay, duration);
    addBubble(text, 'them');
  }

  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function handleSend() {
    const val = chatInput.value.trim();
    if (!val) return;
    chatInput.value = '';
    chatInput.style.height = 'auto';

    if (step === 0) {
      data.name = val;
      step = 1;
      addBubble(escHtml(val), 'me');
      inputBar.style.display = 'none';
      await themSays(nameReplies(escHtml(data.name)), 350, 750);
      suggestions.classList.add('show');
      chatInput.placeholder = 'Message...';
      inputBar.style.display = 'flex';
      setTimeout(() => chatInput.focus(), 60);

    } else if (step === 1) {
      // free-type subject
      data.subject = val;
      step = 2;
      suggestions.classList.remove('show');
      addBubble(escHtml(val), 'me');
      inputBar.style.display = 'none';
      await themSays(pick(subjectReplies), 350, 700);
      chatInput.placeholder = 'Type your message...';
      inputBar.style.display = 'flex';
      setTimeout(() => chatInput.focus(), 60);

    } else if (step === 2) {
      data.message = val;
      step = 3;
      addBubble(escHtml(val), 'me');
      inputBar.style.display = 'none';
      await themSays(pick(finalReplies), 500, 900);
      // Final card
      await wait(600);
      const card = document.createElement('div');
      card.className = 'final-card';
      card.innerHTML = `
        <div class="final-card-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <h4>You are all set.</h4>
        <p>israelbabalola049@gmail.com</p>
      `;
      chatBody.appendChild(card);
      scrollBottom();
    }
  }

  function useSuggestion(btn) {
    chatInput.value = btn.textContent;
    chatInput.focus();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  setTimeout(() => chatInput.focus(), 200);
</script>
</body>
</html>
